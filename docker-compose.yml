volumes:
  HNG-nginx-logs:
    driver: local
  nextcloud-data:
  nextcloud-db:
  detector-logs:
  letsencrypt-certs:
  certbot-webroot:

networks:
  cloud-net:
    driver: bridge

services:

  db:
    image: mariadb:10.6
    container_name: hng-db
    restart: always
    networks:
      - cloud-net
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme_root}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme_nc}
    volumes:
      - nextcloud-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: hng-nextcloud
    restart: always
    networks:
      - cloud-net
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme_nc}
      NEXTCLOUD_ADMIN_USER: ${NC_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD:-changeme_admin}
      NEXTCLOUD_TRUSTED_DOMAINS: "${SERVER_IP:-localhost} ddos-detector.duckdns.org"
    volumes:
      - nextcloud-data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro

  nginx:
    image: nginx:1.25-alpine
    container_name: hng-nginx
    restart: always
    networks:
      - cloud-net
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - nextcloud
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
      - letsencrypt-certs:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Simple renewal loop — initial cert is obtained manually (see README)
  certbot:
    image: certbot/certbot:latest
    container_name: hng-certbot
    restart: always
    volumes:
      - letsencrypt-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done"

  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    container_name: hng-detector
    restart: always
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - detector-logs:/var/log/detector
      - ./detector/config.yaml:/app/config.yaml:ro
    environment:
      - PYTHONUNBUFFERED=1
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
